name: dotnet-template

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dotnet_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dotnet_template"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=dotnet_template;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

volumes:
  postgres-data:

networks:
  default:
    ipam:
      config:
        - subnet: 10.90.2.0/24
